name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: single
            cmake_args: -DDOUBLE_PRECISION=OFF
          - name: double
            cmake_args: -DDOUBLE_PRECISION=ON

    name: Build ${{ matrix.name }}

    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git cmake ninja-build g++

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check CUDA compiler
        run: nvcc --version

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES=86 \
            ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --parallel